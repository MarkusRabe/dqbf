name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type check (mypy)
        run: mypy core provers tools benchmarks/runner
      - name: Unit tests
        run: pytest -m "not integration"

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust crates
        id: detect
        run: |
          if git ls-files '**/Cargo.toml' | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.detect.outputs.present == 'true'
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        if: steps.detect.outputs.present == 'true'
      - name: cargo fmt / clippy / test
        if: steps.detect.outputs.present == 'true'
        run: |
          set -euo pipefail
          for d in $(git ls-files '**/rust/Cargo.toml' | xargs -n1 dirname); do
            (cd "$d" && cargo fmt --all -- --check)
            (cd "$d" && cargo clippy --all-targets -- -D warnings)
            (cd "$d" && cargo test --workspace)
          done
      - name: No Rust crates yet
        if: steps.detect.outputs.present != 'true'
        run: echo "No Cargo.toml found; skipping Rust checks."
